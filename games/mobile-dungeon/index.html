<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Usagi</title>
    <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff1e8;
      font-family: system-ui, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    /* Scale the canvas to fill the viewport while preserving its
    configured aspect ratio. `--game-aspect` is set from JS at load
    time by reading the canvas's intrinsic backing-store dims, so a
    game shipped at any `_config().game_width / game_height` lays
    out correctly without an HTML edit. The backing store stays at
    export-time dims; CSS just resizes the displayed pixels, with
    `image-rendering: pixelated` keeping the upscale crisp.
    The `min()` pair gives the largest box that fits the viewport
    while keeping aspect: width is whichever is smaller of the
    viewport's width or the height-derived width, and vice versa.
    This is what makes itch.io's fullscreen button work: when itch
    fullscreens its iframe, our canvas inside grows to fill it
    instead of staying at backing-store size in the middle of a
    black void. The same rule helps when the embed iframe's size
    doesn't exactly match the exported game dims. */
    canvas {
      display: block;
      image-rendering: pixelated;
      /* `--game-aspect` is a single number (W / H precomputed in
      JS), not a `W / H` ratio expression. That keeps the CSS
      unambiguous: `100vw / var(--game-aspect)` evaluates as
      `100vw / 1.778` rather than `(100vw / W) / H`, which is
      what would happen if `var()` substituted a ratio expression
      as raw text. */
      width: min(100vw, 100vh * var(--game-aspect, 1.778));
      height: min(100vh, 100vw / var(--game-aspect, 1.778));
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    #overlay button {
      background: #ffa300;
      color: #000000;
      border: none;
      padding: 14px 32px;
      font: inherit;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      min-width: 200px;
    }
    #overlay button:disabled {
      background: #5f574f;
      color: #fff1e8;
      cursor: progress;
    }
    #overlay .sub {
      opacity: 0.6;
      font-size: 13px;
      margin-top: 16px;
    }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="360" height="640"></canvas>
    <script>
    // `--game-aspect` is a single number, not a `W / H` ratio:
    // var() substitutes raw text, so a ratio would produce
    // `(100vw / W) / H` (near-zero, black screen). Re-run after
    // callMain since raylib's emscripten canvas resize doesn't
    // fire DOM mutation events.
    function _usagi_update_aspect() {
      const c = document.getElementById("canvas");
      document.documentElement.style.setProperty(
        "--game-aspect",
        c.width / c.height,
      );
    }
    _usagi_update_aspect();
    </script>
    <script>
    // Stop game-input keys from triggering the host page's default
    // scroll. Without this, Down/Space scroll the surrounding page
    // when the canvas is embedded in scrollable surroundings (notably
    // itch.io's wrapper). raylib's emscripten port forwards keydown
    // through GLFW, which only preventDefaults Backspace/Tab — see
    // emscripten#16805. Listen on `window`, not the canvas: itch.io's
    // iframe doesn't reliably hand focus to the canvas, so checking
    // `document.activeElement === canvas` would silently fail there.
    // Filtering by `e.code` is enough; none of these keys do anything
    // useful on the surrounding page anyway.
    window.addEventListener("keydown", function (e) {
      switch (e.code) {
        case "Space":
        case "ArrowUp":
        case "ArrowDown":
        case "ArrowLeft":
        case "ArrowRight":
        case "PageUp":
        case "PageDown":
        case "Home":
        case "End":
          e.preventDefault();
      }
    });
    // Allow right clicks in the game, don't show the default browser menu
    window.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });
    </script>
    <div id="overlay" role="button" tabindex="0">
      <button id="start" disabled>Loading…</button>
      <div class="sub"></div>
    </div>
    <script>
    // Click-to-play overlay. Two jobs:
    //   1. Browsers block AudioContext until a user gesture, so we hold
    //      `main()` until a click and start everything inside it.
    //   2. We fetch the game bundle (`game.usagi`) over HTTP and write it
    //      to the wasm virtual FS before calling main(). This is how a
    //      single prebuilt usagi runtime can ship any game without an
    //      emcc rebuild. Override the bundle URL by setting
    //      `window.USAGI_BUNDLE_URL` before this script runs.
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("start");
    const subText = overlay.querySelector(".sub");
    const bundleUrl = window.USAGI_BUNDLE_URL || "game.usagi";
    let runtimeReady = false;
    let started = false;

    var Module = {
      canvas: document.getElementById("canvas"),
      // Don't auto-run main(); we drive it from the click handler so the
      // bundle is in place and we're inside a user gesture.
      noInitialRun: true,
      // Append `?verbose=1` in the URL to get
      // console logs with frame timings and memory diagnostics
      preRun: [function () {
        if (new URLSearchParams(location.search).has("verbose")) {
          ENV.USAGI_VERBOSE = "1";
        }
      }],
      onRuntimeInitialized: function () {
        runtimeReady = true;
        startBtn.disabled = false;
        startBtn.textContent = "Click to play";
      },
    };

    async function start() {
      if (started || !runtimeReady) return;
      started = true;
      startBtn.disabled = true;
      startBtn.textContent = "Loading game…";

      try {
        const res = await fetch(bundleUrl);
        if (!res.ok) {
          throw new Error(
            `${bundleUrl}: HTTP ${res.status} ${res.statusText}`,
          );
        }
        const bytes = new Uint8Array(await res.arrayBuffer());
        Module.FS.writeFile("/game.usagi", bytes);
      } catch (e) {
        console.error("usagi: bundle fetch failed", e);
        startBtn.textContent = "Failed to load";
        subText.textContent = String(e.message || e);
        started = false;
        startBtn.disabled = false;
        return;
      }

      overlay.style.display = "none";

      // Resume any AudioContext emscripten/raylib already created. Most
      // are created later inside main() (still inside the user gesture)
      // and start in `running` state automatically.
      if (
        Module.audioContext &&
        Module.audioContext.state === "suspended"
      ) {
        Module.audioContext.resume();
      }

      try {
        Module.callMain([]);
      } catch (e) {
        console.error("usagi: main() threw", e);
      }

      // raylib resized the canvas backing-store inside callMain;
      // re-derive --game-aspect from the post-init dims.
      _usagi_update_aspect();
    }

    overlay.addEventListener("click", start);
    overlay.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") start();
    });
    </script>
    <script src="usagi.js"></script>
  </body>
</html>
